<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="32" height="32" rx="6" fill="#0F111A"/>

  <!-- AI 大脑主体 -->
  <path d="M16 6 C10 6 6 10 6 16 C6 22 10 26 16 26 C22 26 26 22 26 16 C26 10 22 6 16 6 Z"
        fill="none" stroke="url(#grad)" stroke-width="2"/>

  <!-- 内部神经网络节点 -->
  <circle cx="16" cy="12" r="2.5" fill="url(#grad)"/>
  <circle cx="11" cy="18" r="2" fill="url(#grad)"/>
  <circle cx="21" cy="18" r="2" fill="url(#grad)"/>
  <circle cx="16" cy="22" r="2" fill="url(#grad)"/>

  <!-- 神经网络连接线 -->
  <path d="M16 12 L11 18 L16 22 L21 18 Z" fill="none" stroke="url(#grad)" stroke-width="1.5"/>
  <line x1="16" y1="12" x2="16" y2="22" stroke="url(#grad)" stroke-width="1"/>

  <!-- 顶部 AI 信号点 -->
  <circle cx="16" cy="8" r="1.5" fill="#6366F1"/>
  <circle cx="13" cy="9" r="1" fill="#8B5CF6"/>
  <circle cx="19" cy="9" r="1" fill="#8B5CF6"/>
</svg>
